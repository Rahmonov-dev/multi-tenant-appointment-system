<!DOCTYPE html>
<html th:replace="~{layout :: html(title='Tenant Detail - Appointment System', content=~{::section})}">

<body>
<section>
    <div id="tenant-header" class="page-header">
        <h1 class="page-title" id="org-name">Yuklanmoqda...</h1>
        <p id="business-type" class="badge badge-primary" style="margin-top: 0.5rem"></p>
        <div id="page-error" class="error-box"></div>
    </div>

    <div class="detail-grid">
        <div class="col">
            <div class="card" style="cursor: default; pointer-events: none; margin-bottom: 2rem;">
                <h3 class="section-title"><i data-lucide="info"></i> Ma'lumotlar</h3>
                <div class="info-row"><i data-lucide="map-pin"></i> <span id="address">-</span></div>
                <div class="info-row"><i data-lucide="phone"></i> <span id="phone">-</span></div>
                <div class="info-row"><i data-lucide="mail"></i> <span id="email">-</span></div>
                <div class="info-row"><i data-lucide="clock"></i> <span id="hours">-</span></div>
            </div>

            <h3 class="section-title"><i data-lucide="scissors"></i> Xizmatlar</h3>
            <div id="services-list">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <div class="col">
            <h3 class="section-title"><i data-lucide="users"></i> Mutaxassislar</h3>
            <div id="staff-list">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function handleBookingClick(slug, serviceId) {
            const token = localStorage.getItem('token');
            if (!token) {
                const currentUrl = window.location.pathname;
                window.location.href = `/dashboard/login?returnUrl=${encodeURIComponent(currentUrl)}`;
                return;
            }
            window.location.href = `/dashboard/tenant/${slug}/book/${serviceId}`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            clearError('page-error');
            const parts = window.location.pathname.split('/').filter(Boolean);
            const slug = parts[parts.length - 1];

            try {
                const tenantResult = await api(`/api/tenant/${slug}/by-slug`, { method: 'GET' });
                const t = tenantResult.data;

                const tenantId = t.id;
                document.getElementById('org-name').textContent = t.organizationName || 'Nomsiz';
                document.getElementById('business-type').textContent = t.businessType || '';
                document.getElementById('address').textContent = t.address || '-';
                document.getElementById('phone').textContent = t.phone || '-';
                document.getElementById('email').textContent = t.email || '-';

                const start = (t.workingHoursStart || '').substring(0, 5) || '--:--';
                const end = (t.workingHoursEnd || '').substring(0, 5) || '--:--';
                document.getElementById('hours').textContent = `${start} - ${end}`;

                // Services
                const servicesBox = document.getElementById('services-list');
                try {
                    const servicesResult = await api(`/api/${tenantId}/services/by-tenant?activeOnly=true`, { method: 'GET' });
                    const services = servicesResult.data || [];
                    if (services.length === 0) {
                        servicesBox.innerHTML = `<div class="empty">Xizmatlar topilmadi.</div>`;
                    } else {
                        servicesBox.innerHTML = '';
                        services.forEach(s => {
                            const price = (s.price ?? 0).toLocaleString();
                            servicesBox.innerHTML += `
                  <div class="list-item">
                    <div class="list-item-content">
                      <h4>${s.name || 'Nomsiz xizmat'}</h4>
                      <p>${s.description || "Tavsif yo'q"}</p>
                    </div>
                    <div style="text-align: right">
                      <div style="font-weight: 700; color: var(--primary)">${price} so'm</div>
                      <div style="font-size: 0.75rem; color: var(--text-muted)">${s.duration || 0} daqiqa</div>
                      <button class="btn-sm" style="margin-top: 0.5rem"
                        onclick="handleBookingClick('${slug}', '${s.id}')">
                        Navbat olish
                      </button>
                    </div>
                  </div>
                `;
                        });
                    }
                } catch (e) {
                    servicesBox.innerHTML = `<div class="empty">Xizmatlarni yuklashda xatolik: ${e.message}</div>`;
                }

                // Staff
                const staffBox = document.getElementById('staff-list');
                try {
                    const staffResult = await api(`/api/${tenantId}/staff/by-tenant?activeOnly=true`, { method: 'GET' });
                    const staff = staffResult.data || [];
                    if (staff.length === 0) {
                        staffBox.innerHTML = `<div class="empty">Xodimlar topilmadi.</div>`;
                    } else {
                        staffBox.innerHTML = '';
                        staff.forEach(s => {
                            staffBox.innerHTML += `
                  <div class="list-item">
                    <div class="list-item-content">
                      <h4>${s.displayName || '-'}</h4>
                      <p>${s.position || '-'} ${s.role ? `(${s.role})` : ''}</p>
                    </div>
                    <i data-lucide="chevron-right" style="color: var(--border)"></i>
                  </div>
                `;
                        });
                        lucide.createIcons();
                    }
                } catch (e) {
                    staffBox.innerHTML = `<div class="empty">Xodimlarni yuklashda xatolik: ${e.message}</div>`;
                }

                lucide.createIcons();
            } catch (err) {
                console.error(err);
                document.getElementById('org-name').textContent = 'Topilmadi';
                renderError('page-error', err.message || 'Ma’lumotni yuklab bo‘lmadi');
            }
        });
    </script>
</section>
</body>

</html>
