<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title ?: 'Appointment System Dashboard'}"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="/dashboard/tenants" class="logo">
                <i data-lucide="calendar"></i>
                <span>Appointment System</span>
            </a>

            <div id="nav-auth" style="display: flex; gap: 1rem; align-items: center;">
                <div class="loading" style="padding: 0; width: 20px; height: 20px;">
                    <div class="spinner" style="width: 1rem; height: 1rem;"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Toast container -->
    <div id="toast-root" class="toast-root"></div>

    <main class="container">
        <div th:replace="${content}"></div>
    </main>

    <script>
        // ---------- Small UI Helpers ----------
        function toast(message, type = 'info') {
            const root = document.getElementById('toast-root');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = message;
            root.appendChild(el);
            setTimeout(() => {
                el.classList.add('hide');
                setTimeout(() => el.remove(), 250);
            }, 2800);
        }

        function renderError(containerId, message) {
            const el = document.getElementById(containerId);
            if (!el) return;
            el.style.display = 'block';
            el.textContent = message;
        }

        function clearError(containerId) {
            const el = document.getElementById(containerId);
            if (!el) return;
            el.style.display = 'none';
            el.textContent = '';
        }

        function normalizePhone(raw) {
            if (!raw) return '';
            return String(raw).replace(/[^\d]/g, '');
        }

        // ---------- API Helper ----------
        async function api(url, options = {}) {
            const token = localStorage.getItem('token');

            const headers = {
                ...(options.headers || {}),
            };

            const isFormData = options.body instanceof FormData;
            if (!isFormData && !headers['Content-Type']) {
                headers['Content-Type'] = 'application/json';
            }

            if (token && !headers['Authorization']) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            const res = await fetch(url, { ...options, headers });

            let data = null;
            const ct = res.headers.get('content-type') || '';
            if (ct.includes('application/json')) {
                data = await res.json();
            } else {
                const text = await res.text();
                data = { success: res.ok, message: text };
            }

            // Token expired → clear and redirect to login
            if (res.status === 401) {
                localStorage.removeItem('token');
                const returnUrl = encodeURIComponent(window.location.pathname + window.location.search);
                window.location.href = `/dashboard/login?returnUrl=${returnUrl}`;
                throw new Error('Unauthorized');
            }
            // Permission denied → just throw error (don't log out)
            if (res.status === 403) {
                const msg = (data && data.message) ? data.message : 'Ruxsat yo\'q';
                throw new Error(msg);
            }

            if (!res.ok || (data && data.success === false)) {
                const msg = (data && (data.message || data.error)) ? (data.message || data.error) : 'Xatolik yuz berdi';
                const err = new Error(msg);
                err.data = data;
                throw err;
            }

            return data;
        }

        // ---------- Auth ----------
        async function checkAuth() {
            const token = localStorage.getItem('token');
            const navAuth = document.getElementById('nav-auth');

            if (!token) {
                navAuth.innerHTML = `
          <a href="/dashboard/login" class="btn-sm" style="background: transparent; color: var(--text-main); border: 1px solid var(--border)">Kirish</a>
          <a href="/dashboard/register" class="btn-sm">Ro'yxatdan o'tish</a>
        `;
                return null;
            }

            try {
                const result = await api('/api/auth/me', { method: 'GET' });
                const user = result.data;

                let manageLink = '';
                if (user.tenantSlug) {
                    manageLink = `
              <a href="/dashboard/manage/${user.tenantSlug}" style="font-size: 0.875rem; font-weight: 500; color: var(--primary); text-decoration: none; display:flex; align-items:center; gap:0.4rem;">
                <i data-lucide="layout-dashboard" style="width:16px;height:16px;"></i>
                Boshqaruv paneli
              </a>
            `;
                } else if (user.staffTenantSlug) {
                    manageLink = `
              <a href="/dashboard/staff/${user.staffTenantSlug}" style="font-size: 0.875rem; font-weight: 500; color: var(--primary); text-decoration: none; display:flex; align-items:center; gap:0.4rem;">
                <i data-lucide="briefcase" style="width:16px;height:16px;"></i>
                Ish joyi
              </a>
            `;
                }

                navAuth.innerHTML = `
          <a href="/dashboard/profile" style="font-size: 0.875rem; font-weight: 500; color: var(--text-main); text-decoration: none; display:flex; align-items:center; gap:0.4rem;">
            <i data-lucide="user-circle" style="width:18px;height:18px;"></i>
            ${user.fullName}
          </a>
          ${manageLink}
          <button onclick="logout()" class="btn-sm" style="background: var(--bg-main); color: var(--text-main); border: 1px solid var(--border)">
            <i data-lucide="log-out" style="width: 14px; height: 14px"></i>
          </button>
        `;
                lucide.createIcons();
                return user;
            } catch (err) {
                // Only clear token for auth errors (401/403); api() already handles redirect for those.
                // For other errors (network, server), keep the token and show cached state.
                if (err.message === 'Unauthorized') {
                    navAuth.innerHTML = `
          <a href="/dashboard/login" class="btn-sm" style="background: transparent; color: var(--text-main); border: 1px solid var(--border)">Kirish</a>
          <a href="/dashboard/register" class="btn-sm">Ro'yxatdan o'tish</a>
        `;
                } else {
                    navAuth.innerHTML = `
          <a href="/dashboard/profile" style="font-size: 0.875rem; font-weight: 500; color: var(--text-main); text-decoration: none;">Profil</a>
          <button onclick="logout()" class="btn-sm" style="background: var(--bg-main); color: var(--text-main); border: 1px solid var(--border)">
            <i data-lucide="log-out" style="width: 14px; height: 14px"></i>
          </button>
        `;
                    lucide.createIcons();
                }
                return null;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/dashboard/tenants';
        }

        function requireAuthOrRedirect() {
            const token = localStorage.getItem('token');
            if (!token) {
                const returnUrl = encodeURIComponent(window.location.pathname + window.location.search);
                window.location.href = `/dashboard/login?returnUrl=${returnUrl}`;
                return false;
            }
            return true;
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            lucide.createIcons();
        });
    </script>
</body>

</html>
