<!DOCTYPE html>
<html th:replace="~{layout :: html(title='Profilim - Appointment System', content=~{::section})}">

<body>
    <section>
        <div id="page-error" class="error-box"></div>

        <!-- User Info Card -->
        <div id="profile-loading" class="loading" style="margin: 3rem auto; width: fit-content;">
            <div class="spinner"></div>
        </div>

        <div id="profile-content" style="display:none;">

            <!-- ===== Two-column layout ===== -->
            <div style="display:grid;grid-template-columns:280px 1fr;gap:2rem;align-items:start;">

                <!-- LEFT: User Info Sidebar -->
                <div style="position:sticky;top:1.5rem;">
                    <div style="background:var(--bg-card,#fff);border:1px solid var(--border);border-radius:1rem;padding:1.5rem;text-align:center;">
                        <div style="width:72px;height:72px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
                            <i data-lucide="user" style="width:36px;height:36px;color:#fff;"></i>
                        </div>
                        <h2 id="profile-name" style="margin:0 0 0.25rem;font-size:1.1rem;font-weight:700;">-</h2>
                        <p id="profile-email" style="color:var(--text-muted);font-size:0.83rem;margin:0 0 0.15rem;word-break:break-all;"></p>
                        <p id="profile-phone" style="color:var(--text-muted);font-size:0.83rem;margin:0 0 0.75rem;"></p>
                        <div id="profile-roles" style="display:flex;gap:0.4rem;flex-wrap:wrap;justify-content:center;"></div>
                    </div>

                    <!-- Owner / Staff links in sidebar -->
                    <div id="owner-section" style="display:none;margin-top:1rem;">
                        <div style="background:var(--bg-card,#fff);border:1px solid var(--border);border-radius:1rem;padding:1.25rem;">
                            <div style="font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:0.6rem;text-transform:uppercase;letter-spacing:0.04em;">Biznesim</div>
                            <a id="owner-tenant-link" href="#" class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;">
                                <i data-lucide="layout-dashboard" style="width:14px;height:14px;vertical-align:middle;"></i>
                                Boshqaruv paneli
                            </a>
                        </div>
                    </div>

                    <!-- Create org button in sidebar -->
                    <div id="create-org-section" style="display:none;margin-top:1rem;">
                        <div style="background:var(--bg-card,#fff);border:1px solid var(--border);border-radius:1rem;padding:1.25rem;">
                            <div style="font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.04em;">Biznes</div>
                            <p style="font-size:0.82rem;color:var(--text-muted);margin:0 0 0.75rem;">Mijozlaringiz online navbat olsin</p>
                            <button onclick="openCreateOrgModal()" class="btn btn-primary" style="width:100%;">
                                <i data-lucide="plus" style="width:14px;height:14px;"></i> Yaratish
                            </button>
                        </div>
                    </div>
                </div>

                <!-- RIGHT: Appointments -->
                <div>
                    <h2 style="font-size:1.1rem;font-weight:700;margin:0 0 1rem;display:flex;align-items:center;gap:0.5rem;">
                        <i data-lucide="calendar-check" style="width:18px;height:18px;color:var(--primary);"></i>
                        Mening Navbatlarim
                    </h2>

                    <!-- Tabs -->
                    <div style="display:flex;gap:0.5rem;margin-bottom:1.25rem;border-bottom:2px solid var(--border);">
                        <button id="tab-upcoming" class="tab-btn tab-active" onclick="switchTab('upcoming')">
                            <i data-lucide="clock" style="width:14px;height:14px;"></i> Faol navbatlar
                        </button>
                        <button id="tab-past" class="tab-btn" onclick="switchTab('past')">
                            <i data-lucide="history" style="width:14px;height:14px;"></i> O'tgan navbatlar
                        </button>
                    </div>

                    <div id="appointments-container">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>

            <!-- ===== Cancel Modal ===== -->
            <div id="cancel-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;overflow-y:auto;padding:1rem;">
                <div style="background:var(--bg-card,#fff);border-radius:1rem;padding:1.5rem;max-width:440px;margin:3rem auto;position:relative;">
                    <button onclick="closeCancelModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:var(--text-muted);">
                        <i data-lucide="x" style="width:20px;height:20px;"></i>
                    </button>
                    <h3 style="margin:0 0 1rem;font-size:1rem;font-weight:600;">
                        <i data-lucide="x-circle" style="width:16px;height:16px;vertical-align:middle;color:#dc2626;"></i>
                        Navbatni bekor qilish
                    </h3>
                    <p id="cancel-appt-info" style="font-size:0.88rem;color:var(--text-muted);margin-bottom:1rem;"></p>
                    <div class="form-group">
                        <label class="label">Sabab <span style="color:#dc2626;">*</span></label>
                        <textarea id="cancel-reason" class="input" style="height:80px;" placeholder="Bekor qilish sababini kiriting..."></textarea>
                    </div>
                    <div id="cancel-error" class="error-box"></div>
                    <div style="display:flex;gap:0.75rem;margin-top:1rem;">
                        <button onclick="closeCancelModal()" class="btn" style="flex:1;border:1px solid var(--border);">Orqaga</button>
                        <button onclick="submitCancel()" class="btn" id="cancel-submit-btn"
                            style="flex:1;background:#dc2626;color:#fff;border:none;">
                            Bekor qilish
                        </button>
                    </div>
                </div>
            </div>

            <!-- ===== Reschedule Modal ===== -->
            <div id="reschedule-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;overflow-y:auto;padding:1rem;">
                <div style="background:var(--bg-card,#fff);border-radius:1rem;padding:1.5rem;max-width:480px;margin:3rem auto;position:relative;">
                    <button onclick="closeRescheduleModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:var(--text-muted);">
                        <i data-lucide="x" style="width:20px;height:20px;"></i>
                    </button>
                    <h3 style="margin:0 0 0.25rem;font-size:1rem;font-weight:600;">
                        <i data-lucide="calendar-clock" style="width:16px;height:16px;vertical-align:middle;color:var(--primary);"></i>
                        Vaqtni o'zgartirish
                    </h3>
                    <p id="reschedule-appt-info" style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;"></p>
                    <div class="form-group">
                        <label class="label">Yangi sana</label>
                        <input type="date" id="reschedule-date" class="input">
                    </div>
                    <div class="form-group">
                        <label class="label">Bo'sh vaqtlar</label>
                        <div id="reschedule-slots" style="min-height:48px;">
                            <p style="font-size:0.85rem;color:var(--text-muted);">Sana tanlang</p>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="label">Sabab (ixtiyoriy)</label>
                        <input type="text" id="reschedule-reason" class="input" placeholder="Vaqt o'zgartirish sababi...">
                    </div>
                    <div id="reschedule-error" class="error-box"></div>
                    <div style="display:flex;gap:0.75rem;margin-top:1rem;">
                        <button onclick="closeRescheduleModal()" class="btn" style="flex:1;border:1px solid var(--border);">Bekor</button>
                        <button onclick="submitReschedule()" class="btn btn-primary" id="reschedule-submit-btn" style="flex:1;" disabled>
                            Saqlash
                        </button>
                    </div>
                </div>
            </div>


            <!-- ===== Create Organization Modal ===== -->
            <div id="create-org-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;overflow-y:auto;padding:1rem;">
                <div style="background:var(--bg-card,#fff);border-radius:1rem;padding:1.5rem;max-width:620px;margin:2rem auto;position:relative;">
                    <button onclick="closeCreateOrgModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:var(--text-muted);">
                        <i data-lucide="x" style="width:20px;height:20px;"></i>
                    </button>
                    <h2 style="font-size:1.1rem;font-weight:600;margin:0 0 0.25rem;display:flex;align-items:center;gap:0.5rem;">
                        <i data-lucide="building-2" style="width:18px;height:18px;color:var(--primary);"></i>
                        Organizatsiya yaratish
                    </h2>
                    <p style="color:var(--text-muted);font-size:0.85rem;margin:0 0 1.25rem;">O'z biznesingizni ro'yxatga oling.</p>

                    <form id="create-tenant-form">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                            <div class="form-group" style="grid-column:1/-1;">
                                <label class="label">Biznes turi *</label>
                                <select id="businessType" class="input" required>
                                    <option value="">Tanlang...</option>
                                    <option value="BARBERSHOP">Sartaroshxona</option>
                                    <option value="BEAUTY_SALON">Go'zallik saloni</option>
                                    <option value="MEDICAL_CLINIC">Tibbiy klinika</option>
                                    <option value="FITNESS_CENTER">Fitness markaz</option>
                                    <option value="SPA_CENTER">Spa markaz</option>
                                    <option value="DENTAL_CLINIC">Stomatologiya</option>
                                    <option value="NAIL_SALON">Manikür saloni</option>
                                    <option value="OTHER">Boshqa</option>
                                </select>
                            </div>
                            <div class="form-group" style="grid-column:1/-1;">
                                <label class="label">Organizatsiya nomi *</label>
                                <input type="text" id="organizationName" class="input" required
                                    placeholder="Mening Salonlarim" maxlength="200">
                            </div>
                            <div class="form-group">
                                <label class="label">Email *</label>
                                <input type="email" id="orgEmail" class="input" required placeholder="salon@mail.com">
                            </div>
                            <div class="form-group">
                                <label class="label">Telefon *</label>
                                <input type="tel" id="orgPhone" class="input" required placeholder="+998901234567">
                            </div>
                            <div class="form-group" style="grid-column:1/-1;">
                                <label class="label">Manzil *</label>
                                <input type="text" id="orgAddress" class="input" required
                                    placeholder="Toshkent, Chilonzor 12-uy" maxlength="500">
                            </div>
                            <div class="form-group">
                                <label class="label">Ish boshlanishi *</label>
                                <input type="time" id="workStart" class="input" required value="09:00">
                            </div>
                            <div class="form-group">
                                <label class="label">Ish tugashi *</label>
                                <input type="time" id="workEnd" class="input" required value="18:00">
                            </div>
                            <div class="form-group">
                                <label class="label">Slot davomiyligi (daqiqa) *</label>
                                <input type="number" id="slotDuration" class="input" required value="30" min="15" max="240">
                            </div>
                            <div class="form-group">
                                <label class="label">Oldindan bron (kun) *</label>
                                <input type="number" id="advanceBookingDays" class="input" required value="7" min="1" max="365">
                            </div>
                            <div class="form-group" style="grid-column:1/-1;display:flex;align-items:center;gap:0.75rem;">
                                <input type="checkbox" id="autoConfirm" style="width:18px;height:18px;cursor:pointer;">
                                <label for="autoConfirm" class="label" style="margin:0;cursor:pointer;">Navbatlarni avtomatik tasdiqlash</label>
                            </div>
                        </div>
                        <div id="org-error" class="error-box"></div>
                        <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
                            <button type="button" onclick="closeCreateOrgModal()" class="btn" style="flex:1;border:1px solid var(--border);">Bekor</button>
                            <button type="submit" class="btn btn-primary" style="flex:1;" id="create-org-btn">
                                Yaratish
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            </div><!-- end two-column grid -->
        </div>

        <style>
            @media (max-width: 640px) {
                #profile-content > div[style*="grid-template-columns"] {
                    grid-template-columns: 1fr !important;
                }
                #profile-content > div > div[style*="sticky"] {
                    position: static !important;
                }
            }
            .tab-btn {
                padding: 0.5rem 1rem;
                background: transparent;
                border: none;
                border-bottom: 2px solid transparent;
                cursor: pointer;
                font-size: 0.875rem;
                font-weight: 500;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                gap: 0.4rem;
                margin-bottom: -2px;
                transition: color 0.2s, border-color 0.2s;
            }

            .tab-btn:hover {
                color: var(--text-main);
            }

            .tab-active {
                color: var(--primary) !important;
                border-bottom-color: var(--primary) !important;
            }

            .appt-card {
                background: var(--bg-card, var(--bg-main));
                border: 1px solid var(--border);
                border-radius: 0.75rem;
                padding: 1rem 1.25rem;
                margin-bottom: 0.75rem;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 1rem;
                flex-wrap: wrap;
            }

            .status-badge {
                font-size: 0.75rem;
                padding: 0.2rem 0.6rem;
                border-radius: 999px;
                font-weight: 600;
            }

            .status-PENDING {
                background: #fef3c7;
                color: #92400e;
            }

            .status-CONFIRMED {
                background: #d1fae5;
                color: #065f46;
            }

            .status-COMPLETED {
                background: #e0e7ff;
                color: #3730a3;
            }

            .status-CANCELLED {
                background: #fee2e2;
                color: #991b1b;
            }

            .status-NO_SHOW {
                background: #f3f4f6;
                color: #6b7280;
            }
        </style>

        <script>
            let currentTab = 'upcoming';
            let currentUser = null;

            function switchTab(tab) {
                currentTab = tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
                document.getElementById(`tab-${tab}`).classList.add('tab-active');
                loadAppointments(tab);
            }

            // ===== APPOINTMENT RENDERING =====
            function renderAppointments(list) {
                const container = document.getElementById('appointments-container');
                if (!list || list.length === 0) {
                    container.innerHTML = `<div class="empty">Navbatlar topilmadi.</div>`;
                    return;
                }

                container.innerHTML = '';
                list.forEach(a => {
                    const date = a.appointmentDate
                        ? new Date(a.appointmentDate).toLocaleDateString('uz-UZ', { day: '2-digit', month: 'long', year: 'numeric' })
                        : '-';
                    const start = (a.startTime || '').toString().substring(0, 5);
                    const end = (a.endTime || '').toString().substring(0, 5);
                    const time = a.formattedTime || (start && end ? `${start} - ${end}` : '-');
                    const statusClass = `status-${a.status || 'PENDING'}`;
                    const canAct = a.status === 'PENDING' || a.status === 'CONFIRMED';

                    const div = document.createElement('div');
                    div.className = 'appt-card';
                    div.id = `appt-card-${a.id}`;
                    div.innerHTML = `
                        <div style="flex:1;min-width:0;">
                            <div style="font-weight:600;margin-bottom:0.3rem;">${a.serviceName || 'Xizmat'}</div>
                            <div style="font-size:0.82rem;color:var(--text-muted);">
                                <span>${a.tenantName || '-'}</span> &bull;
                                <span>${a.staffName || '-'}</span>
                            </div>
                            <div style="font-size:0.82rem;color:var(--text-muted);margin-top:0.2rem;">
                                <i data-lucide="calendar" style="width:12px;height:12px;vertical-align:middle;"></i>
                                ${date} &bull; ${time}
                            </div>
                            ${a.status === 'CANCELLED' && a.cancelReason ? `
                            <div style="margin-top:0.5rem;padding:0.4rem 0.6rem;background:#fef2f2;border-left:3px solid #dc2626;border-radius:0.25rem;">
                                <span style="font-size:0.76rem;color:#dc2626;font-weight:600;">
                                    <i data-lucide="alert-circle" style="width:11px;height:11px;vertical-align:middle;"></i>
                                    Bekor qilish sababi:
                                </span>
                                <span style="font-size:0.78rem;color:#7f1d1d;margin-left:0.25rem;">${a.cancelReason}</span>
                            </div>` : ''}
                            ${canAct ? `
                            <div style="display:flex;gap:0.4rem;margin-top:0.6rem;flex-wrap:wrap;">
                                <button class="appt-reschedule-btn"
                                    data-id="${a.id}" data-tenant="${a.tenantId}"
                                    data-staff="${a.staffId}" data-service="${a.serviceId}"
                                    data-name="${(a.serviceName||'').replace(/"/g,'&quot;')}"
                                    onclick="openRescheduleModalFromEl(this)"
                                    style="padding:0.25rem 0.6rem;font-size:0.76rem;border:1px solid var(--primary);color:var(--primary);background:transparent;border-radius:0.35rem;cursor:pointer;display:flex;align-items:center;gap:0.25rem;">
                                    <i data-lucide="calendar-clock" style="width:11px;height:11px;"></i> Vaqtni o'zgartirish
                                </button>
                                <button class="appt-cancel-btn"
                                    data-id="${a.id}" data-tenant="${a.tenantId}"
                                    data-name="${(a.serviceName||'').replace(/"/g,'&quot;')}"
                                    data-date="${date}" data-time="${time}"
                                    onclick="openCancelModalFromEl(this)"
                                    style="padding:0.25rem 0.6rem;font-size:0.76rem;border:1px solid #dc2626;color:#dc2626;background:transparent;border-radius:0.35rem;cursor:pointer;display:flex;align-items:center;gap:0.25rem;">
                                    <i data-lucide="x-circle" style="width:11px;height:11px;"></i> Bekor qilish
                                </button>
                            </div>` : ''}
                        </div>
                        <div style="text-align:right;flex-shrink:0;">
                            <span class="status-badge ${statusClass}">${a.statusDisplayName || a.status || ''}</span>
                            <div style="font-weight:700;color:var(--primary);margin-top:0.4rem;">${a.formattedPrice || ''}</div>
                        </div>
                    `;
                    container.appendChild(div);
                });
                lucide.createIcons();
            }

            // ===== CANCEL =====
            let cancelApptId = null, cancelTenantId = null;

            function openRescheduleModalFromEl(btn) {
                openRescheduleModal(
                    btn.dataset.id, btn.dataset.tenant,
                    btn.dataset.staff, btn.dataset.service,
                    btn.dataset.name
                );
            }

            function openCancelModalFromEl(btn) {
                openCancelModal(
                    btn.dataset.id, btn.dataset.tenant,
                    btn.dataset.name, btn.dataset.date, btn.dataset.time
                );
            }

            function openCancelModal(apptId, tenantId, serviceName, date, time) {
                cancelApptId = apptId;
                cancelTenantId = tenantId;
                document.getElementById('cancel-appt-info').textContent =
                    `${serviceName} · ${date} · ${time}`;
                document.getElementById('cancel-reason').value = '';
                clearError('cancel-error');
                document.getElementById('cancel-modal').style.display = 'block';
                lucide.createIcons();
            }

            function closeCancelModal() {
                document.getElementById('cancel-modal').style.display = 'none';
                cancelApptId = null; cancelTenantId = null;
            }

            async function submitCancel() {
                clearError('cancel-error');
                const reason = document.getElementById('cancel-reason').value.trim();
                if (!reason) {
                    renderError('cancel-error', 'Sabab kiritish majburiy');
                    return;
                }
                const btn = document.getElementById('cancel-submit-btn');
                btn.disabled = true; btn.textContent = 'Yuklanmoqda...';
                try {
                    await api(`/api/${cancelTenantId}/appointments/${cancelApptId}/cancel`, {
                        method: 'PUT',
                        body: JSON.stringify({ reason })
                    });
                    toast('Navbat bekor qilindi', 'success');
                    closeCancelModal();
                    // Kartochkani yangilash — o'chirmasdan CANCELLED deb ko'rsatish
                    const card = document.getElementById(`appt-card-${cancelApptId}`);
                    if (card) {
                        const badge = card.querySelector('.status-badge');
                        if (badge) {
                            badge.className = 'status-badge status-CANCELLED';
                            badge.textContent = 'Bekor qilingan';
                        }
                        const btns = card.querySelectorAll('button');
                        btns.forEach(b => b.remove());
                    }
                } catch (e) {
                    renderError('cancel-error', e.message || 'Xatolik yuz berdi');
                } finally {
                    btn.disabled = false; btn.textContent = 'Bekor qilish';
                }
            }

            // ===== RESCHEDULE =====
            let rescheduleApptId = null, rescheduleTenantId = null;
            let rescheduleStaffId = null, rescheduleServiceId = null;
            let rescheduleSelectedTime = null;

            function openRescheduleModal(apptId, tenantId, staffId, serviceId, serviceName) {
                rescheduleApptId = apptId;
                rescheduleTenantId = tenantId;
                rescheduleStaffId = staffId;
                rescheduleServiceId = serviceId;
                rescheduleSelectedTime = null;
                document.getElementById('reschedule-appt-info').textContent = serviceName;
                document.getElementById('reschedule-slots').innerHTML =
                    '<p style="font-size:0.85rem;color:var(--text-muted);">Sana tanlang</p>';
                document.getElementById('reschedule-submit-btn').disabled = true;
                clearError('reschedule-error');
                const today = new Date();
                const min = today.toISOString().split('T')[0];
                const dateEl = document.getElementById('reschedule-date');
                dateEl.min = min;
                dateEl.value = '';
                document.getElementById('reschedule-reason').value = '';
                document.getElementById('reschedule-modal').style.display = 'block';
                lucide.createIcons();
            }

            function closeRescheduleModal() {
                document.getElementById('reschedule-modal').style.display = 'none';
                rescheduleApptId = null; rescheduleTenantId = null;
                rescheduleStaffId = null; rescheduleServiceId = null;
                rescheduleSelectedTime = null;
            }

            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('reschedule-date')?.addEventListener('change', async (e) => {
                    const date = e.target.value;
                    if (!date || !rescheduleTenantId) return;
                    rescheduleSelectedTime = null;
                    document.getElementById('reschedule-submit-btn').disabled = true;
                    const slotsEl = document.getElementById('reschedule-slots');
                    slotsEl.innerHTML = '<div class="loading" style="padding:0.5rem 0;"><div class="spinner" style="width:1rem;height:1rem;"></div></div>';
                    try {
                        const res = await api(
                            `/api/${rescheduleTenantId}/appointments/available-slots?staffId=${rescheduleStaffId}&date=${date}&serviceId=${rescheduleServiceId}`,
                            { method: 'GET' }
                        );
                        const slots = (res.data || []).filter(s => s.available !== false);
                        if (slots.length === 0) {
                            slotsEl.innerHTML = '<p style="font-size:0.85rem;color:var(--text-muted);">Bu kunda bo\'sh vaqt yo\'q.</p>';
                            return;
                        }
                        slotsEl.innerHTML = '<div class="slots-grid" style="margin-top:0;"></div>';
                        const grid = slotsEl.querySelector('.slots-grid');
                        slots.forEach(slot => {
                            const t = slot.displayTime || (slot.time || '').toString().substring(0, 5);
                            const btn = document.createElement('div');
                            btn.className = 'slot-btn';
                            btn.textContent = t;
                            btn.onclick = () => {
                                grid.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
                                btn.classList.add('selected');
                                rescheduleSelectedTime = t;
                                document.getElementById('reschedule-submit-btn').disabled = false;
                            };
                            grid.appendChild(btn);
                        });
                    } catch (err) {
                        slotsEl.innerHTML = `<p style="font-size:0.85rem;color:#dc2626;">${err.message}</p>`;
                    }
                });

                document.getElementById('cancel-modal')?.addEventListener('click', e => {
                    if (e.target === document.getElementById('cancel-modal')) closeCancelModal();
                });
                document.getElementById('reschedule-modal')?.addEventListener('click', e => {
                    if (e.target === document.getElementById('reschedule-modal')) closeRescheduleModal();
                });
            }, { once: true });

            async function submitReschedule() {
                clearError('reschedule-error');
                if (!rescheduleSelectedTime) {
                    renderError('reschedule-error', 'Vaqtni tanlang'); return;
                }
                const date = document.getElementById('reschedule-date').value;
                const reason = document.getElementById('reschedule-reason').value.trim();
                const toTime = t => t && t.length === 5 ? t + ':00' : (t || '');
                const btn = document.getElementById('reschedule-submit-btn');
                btn.disabled = true; btn.textContent = 'Saqlanmoqda...';
                try {
                    await api(`/api/${rescheduleTenantId}/appointments/${rescheduleApptId}/reschedule`, {
                        method: 'PUT',
                        body: JSON.stringify({
                            newDate: date,
                            newTime: toTime(rescheduleSelectedTime),
                            reason: reason || null
                        })
                    });
                    toast('Navbat vaqti o\'zgartirildi!', 'success');
                    closeRescheduleModal();
                    loadAppointments(currentTab);
                } catch (e) {
                    renderError('reschedule-error', e.message || 'Xatolik yuz berdi');
                } finally {
                    btn.disabled = false; btn.textContent = 'Saqlash';
                }
            }

            async function loadAppointments(type) {
                const container = document.getElementById('appointments-container');
                container.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
                try {
                    const result = await api(`/api/auth/me/appointments?type=${type}`, { method: 'GET' });
                    renderAppointments(result.data || []);
                } catch (err) {
                    container.innerHTML = `<div class="empty">Navbatlarni yuklashda xatolik: ${err.message}</div>`;
                }
            }

            document.addEventListener('DOMContentLoaded', async () => {
                if (!requireAuthOrRedirect()) return;

                try {
                    const result = await api('/api/auth/me', { method: 'GET' });
                    currentUser = result.data;

                    document.getElementById('profile-name').textContent = currentUser.fullName || '-';
                    document.getElementById('profile-email').textContent = currentUser.email || '';
                    document.getElementById('profile-phone').textContent = currentUser.phone || '';

                    const rolesEl = document.getElementById('profile-roles');
                    (currentUser.roles || []).forEach(role => {
                        const badge = document.createElement('span');
                        badge.className = 'badge badge-primary';
                        badge.textContent = role;
                        rolesEl.appendChild(badge);
                    });

                    document.getElementById('profile-loading').style.display = 'none';
                    document.getElementById('profile-content').style.display = 'block';
                    lucide.createIcons();

                    // Show create-org or owner section based on roles
                    const isOwner = (currentUser.roles || []).includes('OWNER');
                    if (isOwner && currentUser.tenantSlug) {
                        document.getElementById('owner-section').style.display = 'block';
                        document.getElementById('owner-tenant-link').href = `/dashboard/manage/${currentUser.tenantSlug}`;
                    } else if (!isOwner) {
                        document.getElementById('create-org-section').style.display = 'block';
                    }

                    loadAppointments('upcoming');

                } catch (err) {
                    document.getElementById('profile-loading').style.display = 'none';
                    renderError('page-error', err.message || 'Profil ma\'lumotlarini yuklashda xatolik');
                }
            });

            // Create tenant form submit
            function openCreateOrgModal() {
                document.getElementById('create-org-modal').style.display = 'block';
                lucide.createIcons();
            }
            function closeCreateOrgModal() {
                document.getElementById('create-org-modal').style.display = 'none';
            }
            document.addEventListener('click', e => {
                if (e.target === document.getElementById('create-org-modal')) closeCreateOrgModal();
            });

            document.getElementById('create-tenant-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearError('org-error');

                const btn = document.getElementById('create-org-btn');
                btn.disabled = true;
                btn.textContent = 'Yaratilmoqda...';

                const phone = normalizePhone(document.getElementById('orgPhone').value);
                const phoneFormatted = phone.startsWith('998') ? '+' + phone : (phone.length === 9 ? '+998' + phone : phone);

                const payload = {
                    businessType: document.getElementById('businessType').value,
                    organizationName: document.getElementById('organizationName').value.trim(),
                    email: document.getElementById('orgEmail').value.trim(),
                    phone: phoneFormatted,
                    address: document.getElementById('orgAddress').value.trim(),
                    workingHoursStart: document.getElementById('workStart').value,
                    workingHoursEnd: document.getElementById('workEnd').value,
                    slotDuration: parseInt(document.getElementById('slotDuration').value),
                    advanceBookingDays: parseInt(document.getElementById('advanceBookingDays').value),
                    autoConfirmBooking: document.getElementById('autoConfirm').checked,
                    timezone: 'Asia/Tashkent'
                };

                try {
                    const result = await api('/api/tenant', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    toast('Organizatsiya muvaffaqiyatli yaratildi!', 'success');
                    // Redirect to management dashboard
                    setTimeout(() => {
                        window.location.href = `/dashboard/manage/${result.data.slug}`;
                    }, 800);
                } catch (err) {
                    renderError('org-error', err.message || 'Organizatsiya yaratishda xatolik');
                    btn.disabled = false;
                    btn.textContent = 'Organizatsiya yaratish';
                }
            });
        </script>
    </section>
</body>

</html>
